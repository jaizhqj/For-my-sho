<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for my baby ♡</title>

<!-- 👇 هذا يخلي الموقع يملى شاشة الآيفون -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.cdnfonts.com/css/mgf-pinlock-personal-use" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background: linear-gradient(#ffd6e0, #fff);
  text-align: center;
  font-family: "Comic Sans MS", cursive;
  min-height: 100vh;

  /* يخلي المحتوى في وسط الشاشة */
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1, .cute-text {
  font-family: 'MGF Pinlock Personal Use', cursive;
  color: #ff4d88;
}

p {
  color: #555;
  font-size: 20px;
}

button {
  background: #ff4d88;
  color: white;
  border: none;
  padding: 15px 25px;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
  font-family: 'MGF Pinlock Personal Use', cursive;
}

button:hover {
  background: #ff1a66;
}

#imageDisplay img {
  width: 60%;
  max-width: 500px;
  border-radius: 20px;
  margin: 20px 0;
  transition: 0.5s;
  opacity: 0;
}

#imageDisplay img.show {
  opacity: 1;
}
</style>

</head>

<body>

<h1 class="cute-text">hi my love ♡</h1>
<p class="cute-text">you make my world soft n warm like a lil dream 🫶🏻</p>

<button onclick="showSong()">click me ♡</button>

<br><br>

<!-- الأغنية -->
<div id="songBox" style="display:none;">
  <h1 class="cute-text">for my sho ♡</h1>
  <p class="cute-text">this song reminds me of u 𐔌՞ ܸ.ˬ.ܸ՞𐦯 </p>

  <div style="background:#ffc0cb; padding:15px; border-radius:20px; display:inline-block;">
    <audio controls>
      <source src="https://image2url.com/r2/default/audio/1775155993778-0f20fcf5-ffbe-417b-ba30-308cfba82a11.mp3" type="audio/mpeg">
    </audio>
  </div>

  <br><br>
  <button onclick="showNextImage()">Next ♡</button>
</div>

<!-- الصور -->
<div id="imageDisplay" style="display:none;">
  <h1 class="cute-text">cute pic of us >⩊< </h1>
  <img id="currentImage" src="">
  <br>
  <button onclick="showNextImage()">Next ♡</button>
</div>

<!-- تيك توك -->
<div id="tiktokBox" style="display:none;">
  <h1 class="cute-text"> us >< </h1>
  <div style="background:#ffc0cb; padding:10px; border-radius:20px; display:inline-block;">
    <iframe 
      src="https://image2url.com/r2/default/videos/1775156694907-250d8d93-0764-437b-8a56-9610519142e6.mp4"
      width="325" 
      height="580" 
      frameborder="0">
    </iframe>
  </div>
</div>

<script>
const images = [
  "https://i.postimg.cc/9fRJr569/IMG-1927.jpg",
  "https://i.postimg.cc/prY0RfgZ/IMG-1928.jpg",
  "https://i.postimg.cc/8kBwFb09/IMG-1929.jpg"
];

let currentIndex = -1;

function showSong() {
  document.getElementById("songBox").style.display = "block";
}

function showNextImage() {
  currentIndex++;

  if (currentIndex >= images.length) {
    document.getElementById("imageDisplay").style.display = "none";
    document.getElementById("tiktokBox").style.display = "block";
    return;
  }

  document.getElementById("songBox").style.display = "none";
  document.getElementById("tiktokBox").style.display = "none";

  const imgDisplay = document.getElementById("imageDisplay");
  const img = document.getElementById("currentImage");

  imgDisplay.style.display = "block";
  img.classList.remove("show");
  img.src = images[currentIndex];

  setTimeout(() => {
    img.classList.add("show");
  }, 50);
}
</script>

</body>
</html>
